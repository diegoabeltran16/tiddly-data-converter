name: CI — Rust + Go

on:
  push:
    branches: [main, "m01-*"]
  pull_request:
    branches: [main]

jobs:
  rust-extractor:
    name: "Rust · extractor"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/extractor
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --verbose

  rust-doctor:
    name: "Rust · doctor"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/doctor
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --verbose

  go-ingesta:
    name: "Go · ingesta"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go/ingesta
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go test ./... -v -count=1
