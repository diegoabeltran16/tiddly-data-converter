name: CI — Rust + Go

on:
  push:
    branches: [main, "m01-*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rust-extractor:
    name: "Rust · extractor"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/extractor
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --verbose

  rust-doctor:
    name: "Rust · doctor"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/doctor
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --verbose

  go-ingesta:
    name: "Go · ingesta"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go/ingesta
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go test ./... -v -count=1

  go-canon:
    name: "Go · canon"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go/canon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go test ./... -v -count=1

  go-bridge:
    name: "Go · bridge (Ingesta → Canon)"
    runs-on: ubuntu-latest
    needs: [go-ingesta, go-canon]
    defaults:
      run:
        working-directory: go/bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go test ./... -v -count=1

  pipeline-smoke:
    name: "Pipeline · smoke (Extractor → Doctor → Ingesta → Canon → JSONL)"
    runs-on: ubuntu-latest
    needs: [rust-extractor, rust-doctor, go-ingesta, go-canon, go-bridge]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            rust/extractor/target
            rust/doctor/target
          key: ${{ runner.os }}-rust-pipeline-${{ hashFiles('rust/extractor/Cargo.lock', 'rust/doctor/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-pipeline-
      - name: Build Rust binaries (extract + audit)
        run: |
          cargo build --manifest-path rust/extractor/Cargo.toml --bin extract
          cargo build --manifest-path rust/doctor/Cargo.toml --bin audit
      - name: Run pipeline smoke test
        run: bash tests/smoke/test_pipeline_smoke.sh
